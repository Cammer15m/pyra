; PYRA Day 1 - DHT11 on ESP-WROOM-32
; Wiring: DHT11 S -> GPIO4, + -> 3V3, - -> GND
; Serial: CSV "timestamp_ms,temp_c,humidity_pct" @ 115200
[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
monitor_dtr = 0
monitor_rts = 0
lib_deps =
    adafruit/DHT sensor library @ ^1.4.6
    adafruit/Adafruit Unified Sensor @ ^1.1.14
